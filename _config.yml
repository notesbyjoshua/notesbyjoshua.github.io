title: Notes by Joshua
description: Math, Physics, and Thoughts
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

url: "https://notesbyjoshua.github.io"

# Google Form embedded on /feedback/ — paste the iframe src from Form → Send → <> embed
# (must include ?embedded=true). Link the form’s Responses tab to a Google Sheet.
feedback_form_embed_url: ""

# Just the Docs: suppress bottom child-page TOC under Notes (sidebar has links).
defaults:
  - scope:
      path: "Notes"
    values:
      has_toc: false

aux_links:
  "GitHub":
    - "https://github.com/notesbyjoshua"

nav:
  - title: Home
    url: /
  - title: Notes
    url: /Notes/notes/
  - title: Practice Problems
    url: /practiceproblems/practice/
  - title: Blog
    url: /blog/
  - title: Resources
    url: /Resources/resources/
  - title: Feedback
    url: /feedback/
  - title: About
    url: /about/